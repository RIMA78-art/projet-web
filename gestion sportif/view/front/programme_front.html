<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programme Sportif</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f7f9ff 0%, #eaf0ff 100%); }
        .hero { padding: 4rem 0; }
        .card { border: none; border-radius: 1.1rem; }
        .badge-custom { background: #1d4ed8; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.php?action=front">GestSport</a>
        <div class="ms-auto">
            <a href="index.php?action=list" class="btn btn-outline-primary">Administration</a>
        </div>
    </div>
</nav>

<div class="container hero">
    <div class="row align-items-center mb-5">
        <div class="col-lg-7">
            <h1 class="display-5 fw-bold">Trouvez votre programme sportif</h1>
            <p class="lead text-secondary">Filtrez par type et niveau, puis lancez votre entraînement avec une interface moderne et responsive.</p>
        </div>
        <div class="col-lg-5 text-lg-end mt-4 mt-lg-0">
            <a href="#programmes" class="btn btn-primary btn-lg">Voir les programmes</a>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <form class="row g-3" method="get" action="index.php">
                        <input type="hidden" name="action" value="front">
                        <div class="col-md-4">
                            <label class="form-label">Type</label>
                            <select class="form-select" name="type">
                                {{TYPE_OPTIONS}}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Niveau</label>
                            <select class="form-select" name="niveau">
                                {{NIVEAU_OPTIONS}}
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">Filtrer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    {{ALERT_MESSAGE}}

    <div id="programmes" class="row g-4">
        {{PROGRAMME_CARDS}}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
