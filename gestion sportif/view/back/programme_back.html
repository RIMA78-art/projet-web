<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration des programmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7ff; }
        .card { border: none; border-radius: 1rem; }
        .table-responsive { box-shadow: 0 0.75rem 1.5rem rgba(100, 116, 139, 0.08); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.php?action=list">Gestion Sportive</a>
        <div class="ms-auto">
            <a href="index.php?action=front" class="btn btn-outline-light">Front</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h2 class="mb-1">Tableau de bord des programmes</h2>
                    <p class="text-muted">Ajoutez, modifiez ou supprimez les programmes sportifs facilement.</p>
                </div>
            </div>
            {{BACK_MESSAGE}}
        </div>

        <div class="col-12">
            <div class="table-responsive bg-white rounded-4">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Nom</th>
                            <th>Type</th>
                            <th>Durée</th>
                            <th>Niveau</th>
                            <th>Description</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{TABLE_ROWS}}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title mb-4">Ajouter un nouveau programme</h5>
                    <form method="post" action="index.php?action=add">
                        <div class="mb-3">
                            <label class="form-label" for="nom">Nom</label>
                            <input type="text" class="form-control" id="nom" name="nom" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="type">Type</label>
                            <input type="text" class="form-control" id="type" name="type" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="duree">Durée (minutes)</label>
                            <input type="number" class="form-control" id="duree" name="duree" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="niveau">Niveau</label>
                            <input type="text" class="form-control" id="niveau" name="niveau" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="description">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="calories">Calories</label>
                            <input type="number" class="form-control" id="calories" name="calories" min="0" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Ajouter</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            {{EDIT_FORM}}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
